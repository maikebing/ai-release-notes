name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.0.0)"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        default: false
        type: boolean
      language:
        description: "Release notes language: zh (Chinese), en (English), or both (bilingual)"
        required: false
        default: "both"
        type: choice
        options:
          - zh
          - en
          - both
      model:
        description: "Ollama model to use for release notes generation"
        required: false
        default: "qwen2.5:0.5b"
        type: string

jobs:
  release:
    name: Tag & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build dist
        run: npm run build

      - name: Validate dist is up to date
        run: npm run build:check

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit updated dist (if changed)
        run: |
          git add dist/
          if git diff --cached --quiet; then
            echo "dist is already up to date, nothing to commit."
          else
            git commit -m "chore: rebuild dist for ${{ inputs.version }}"
            git push
          fi

      - name: Create and push version tag
        run: |
          VERSION="${{ inputs.version }}"
          git tag -fa "${VERSION}" -m "Release ${VERSION}"
          git push origin "${VERSION}" --force

          # Also update/create a major-version floating tag (e.g. v1 -> latest v1.x.x)
          MAJOR_TAG=$(echo "${VERSION}" | grep -oE '^v[0-9]+')
          if [ -n "${MAJOR_TAG}" ]; then
            git tag -fa "${MAJOR_TAG}" -m "Update ${MAJOR_TAG} to ${VERSION}"
            git push origin "${MAJOR_TAG}" --force
          fi

      - name: Generate AI release notes
        id: ai_notes
        uses: ./
        with:
          to_tag: ${{ inputs.version }}
          model: ${{ inputs.model }}
          language: ${{ inputs.language }}
          include_diffstat: "true"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ inputs.version }}"
          PRERELEASE_FLAG=""
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          # Write release notes to file
          printf '%s' "${{ steps.ai_notes.outputs.release_notes }}" > release_notes.md

          gh release create "${VERSION}" \
            --title "${VERSION}" \
            --notes-file release_notes.md \
            ${PRERELEASE_FLAG} \
            --verify-tag
